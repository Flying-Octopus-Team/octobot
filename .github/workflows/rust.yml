name: Rust

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    # don't install husky hooks during CI as they are only needed for for pre-push
    CARGO_HUSKY_DONT_INSTALL_HOOKS: true

jobs:
    lint:
        name: Formatting and linting
        strategy:
            fail-fast: false
        runs-on: ubuntu-latest
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Install Rust nightly
              # Pinned to nightly-2026-05-04, the last build before the E0365
              # regression (rust-lang/rust#156264) that breaks `serenity` 0.12.x.
              # Drop the pin once the upstream regression is resolved.
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: nightly-2026-05-04
                  components: rustfmt

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Check typos
              uses: crate-ci/typos@master

            - name: Check formatting
              # Bypass cargo-make to use the date-pinned nightly above; the
              # Makefile.toml task targets the floating `nightly` channel for
              # local development, which CI doesn't install. Restore the
              # cargo-make invocation once the date pin is dropped.
              # run: cargo make fmt-check
              run: cargo +nightly-2026-05-04 fmt --all --check

            - name: Lint dependencies
              uses: EmbarkStudios/cargo-deny-action@v2

    clippy:
        name: Clippy
        strategy:
            fail-fast: false
        runs-on: ubuntu-latest
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Install Rust nightly
              # Pinned to nightly-2026-05-04, the last build before the E0365
              # regression (rust-lang/rust#156264) that breaks `serenity` 0.12.x.
              # Drop the pin once the upstream regression is resolved.
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: nightly-2026-05-04
                  components: clippy

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2
              env:
                  cache-name: ci
              with:
                  shared-key: ubuntu-latest-${{ env.cache-name }}-stable

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Check clippy
              # Bypass cargo-make to use the date-pinned nightly above; see
              # the Check formatting step for the rationale. Restore the
              # cargo-make invocation once the date pin is dropped.
              # run: cargo make clippy
              run: cargo +nightly-2026-05-04 clippy --all-targets --tests --benches --all-features -- -D warnings

    check:
        name: Check
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2
              env:
                  cache-name: ci
              with:
                  shared-key: ${{ matrix.os }}-${{ env.cache-name }}-stable

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Check
              run: cargo make check
              env:
                  RUST_BACKTRACE: full

    test:
        name: Test
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install libpq (macOS)
              if: runner.os == 'macOS'
              run: |
                brew install pkg-config libpq
                echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2
              env:
                  cache-name: ci
              with:
                  shared-key: ${{ matrix.os }}-${{ env.cache-name }}-stable

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Test
              run: cargo make test
              env:
                  RUST_BACKTRACE: full

    # Send Discord notification after every other job
    notification:
        name: Discord notification
        needs: [lint, clippy, check, test]
        runs-on: ubuntu-latest
        if: ${{ always() }}
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Setup notification
              uses: 8BitJonny/gh-get-current-pr@3.0.0
              id: pr

            - name: Actions Status Discord
              uses: sarisia/actions-status-discord@v1.14.1
              with:
                  url: ${{ steps.pr.outputs.pr_url }}
                  webhook: ${{ secrets.FO_DISCORD_WEB_DEVELOPMENT_WEBHOOK }}
                  title: ${{ steps.pr.outputs.pr_title }}
                  status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || contains(needs.*.result, 'skipped') && 'skipped' || 'success' }}
