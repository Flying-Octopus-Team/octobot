name: Rust

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    # don't install husky hooks during CI as they are only needed for for pre-push
    CARGO_HUSKY_DONT_INSTALL_HOOKS: true

jobs:
    lint:
        name: Formatting and linting
        strategy:
            fail-fast: false
        runs-on: ubuntu-latest
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Install Rust nightly
              # Pinned to nightly-2026-05-04 to avoid rust-lang/rust#156264,
              # an E0365 regression introduced in nightly-2026-05-05 that
              # breaks `serenity` 0.12.x via `pub use crate::model::prelude::*`.
              # Drop the pin once the upstream regression is resolved.
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: nightly-2026-05-04
                  components: rustfmt

            - name: Alias dated nightly as `nightly`
              run: rustup toolchain link nightly "$(rustc +nightly-2026-05-04 --print sysroot)"

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Check typos
              uses: crate-ci/typos@master

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Check formatting
              run: cargo make fmt-check

            - name: Lint dependencies
              uses: EmbarkStudios/cargo-deny-action@v2

    clippy:
        name: Clippy
        strategy:
            fail-fast: false
        runs-on: ubuntu-latest
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Install Rust nightly
              # Pinned to nightly-2026-05-04 to avoid rust-lang/rust#156264,
              # an E0365 regression introduced in nightly-2026-05-05 that
              # breaks `serenity` 0.12.x via `pub use crate::model::prelude::*`.
              # Drop the pin once the upstream regression is resolved.
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: nightly-2026-05-04
                  components: clippy

            - name: Alias dated nightly as `nightly`
              run: rustup toolchain link nightly "$(rustc +nightly-2026-05-04 --print sysroot)"

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2
              env:
                  cache-name: ci
              with:
                  shared-key: ubuntu-latest-${{ env.cache-name }}-stable

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Check clippy
              run: cargo make clippy

    check:
        name: Check
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2
              env:
                  cache-name: ci
              with:
                  shared-key: ${{ matrix.os }}-${{ env.cache-name }}-stable

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Check
              run: cargo make check
              env:
                  RUST_BACKTRACE: full

    test:
        name: Test
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Set libpq path (macOS)
              if: matrix.os == 'macos-latest'
              run: echo "PQ_LIB_DIR=$(brew --prefix libpq)/lib" >> $GITHUB_ENV

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2
              env:
                  cache-name: ci
              with:
                  shared-key: ${{ matrix.os }}-${{ env.cache-name }}-stable-pq

            - name: Install cargo-make
              uses: taiki-e/install-action@cargo-make

            - name: Test
              run: cargo make test
              env:
                  RUST_BACKTRACE: full

    # Send Discord notification after every other job
    notification:
        name: Discord notification
        needs: [lint, clippy, check, test]
        runs-on: ubuntu-latest
        if: ${{ always() }}
        steps:
            - name: Checkout sources
              uses: actions/checkout@v4

            - name: Setup notification
              uses: 8BitJonny/gh-get-current-pr@3.0.0
              id: pr

            - name: Actions Status Discord
              uses: sarisia/actions-status-discord@v1.14.1
              with:
                  url: ${{ steps.pr.outputs.pr_url }}
                  webhook: ${{ secrets.FO_DISCORD_WEB_DEVELOPMENT_WEBHOOK }}
                  title: ${{ steps.pr.outputs.pr_title }}
                  status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || contains(needs.*.result, 'skipped') && 'skipped' || 'success' }}
