# configuration for https://github.com/EmbarkStudios/cargo-deny

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `derivative` is unmaintained but still pulled in transitively by poise 0.6.x.
    # No safe upgrade exists and it is a proc-macro with no runtime exposure.
    "RUSTSEC-2024-0388",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = ["Apache-2.0", "BSD-3-Clause", "ISC", "MIT", "MPL-2.0", "CC0-1.0", "Unicode-3.0", "CDLA-Permissive-2.0"]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]