# configuration for https://github.com/EmbarkStudios/cargo-deny

[advisories]
version = 2
yanked = "deny"

# These advisories are in transitive dependencies that require upstream fixes.
# They cannot be resolved by this project alone.
ignore = [
    # derivative is unmaintained; used by poise (RUSTSEC-2024-0388)
    # Fix requires: poise to migrate away from derivative
    "RUSTSEC-2024-0388",
    # rustls-webpki vulnerabilities via tokio-tungstenite → rustls 0.22.4
    # rustls 0.22.4 pins rustls-webpki ^0.102.1 which contains these issues.
    # Fix requires: tokio-tungstenite or serenity to update to rustls 0.23+
    "RUSTSEC-2026-0049",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = ["Apache-2.0", "BSD-3-Clause", "ISC", "MIT", "MPL-2.0", "CC0-1.0", "Unicode-3.0", "CDLA-Permissive-2.0"]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
