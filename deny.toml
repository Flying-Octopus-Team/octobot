# configuration for https://github.com/EmbarkStudios/cargo-deny

[advisories]
version = 2
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2025-0056", reason = "adler has no maintained replacement; transitive dep of miniz_oxide via flate2/serenity" },
    { id = "RUSTSEC-2024-0388", reason = "derivative crate is unmaintained; transitive dep of poise" },
    { id = "RUSTSEC-2025-0057", reason = "fxhash has no maintained replacement; transitive dep of serenity" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile is unmaintained; transitive dep of reqwest 0.11.x locked by serenity" },
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki 0.102.8 is pinned by rustls 0.22.4 which is locked by tokio-rustls 0.25.0 via serenity" },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.101.7 is pinned by rustls 0.21.11 which is locked by reqwest 0.11.x" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.101.7 is pinned by rustls 0.21.11 which is locked by reqwest 0.11.x" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.101.7 is pinned by rustls 0.21.11 which is locked by reqwest 0.11.x" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = ["Apache-2.0", "BSD-3-Clause", "ISC", "MIT", "MPL-2.0", "CC0-1.0", "Unicode-3.0"]
exceptions = [
    { allow = [
        "Unicode-DFS-2016",
    ], name = "unicode-ident" },
]

[[licenses.clarify]]
name = "ring"
# SPDX considers OpenSSL to encompass both the OpenSSL and SSLeay licenses
# https://spdx.org/licenses/OpenSSL.html
# ISC - Both BoringSSL and ring use this for their new files
# MIT - "Files in third_party/ have their own licenses, as described therein. The MIT
# license, for third_party/fiat, which, unlike other third_party directories, is
# compiled into non-test libraries, is included below."
# OpenSSL - Obviously
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
